services:
  mongodb:
    image: mongo:6.0
    container_name: billing-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"    # expose for MongoDB Compass
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: billing-backend
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/vjs_billing
      - JWT_SECRET=vjs_jewellery_super_secret_2024_key
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: billing-frontend
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend


volumes:
  mongodb_data:
