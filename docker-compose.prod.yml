# docker-compose.prod.yml
# Used by GitHub Actions on the VPS — pulls images from Docker Hub
# Do NOT use this for local development (use docker-compose.yml instead)

services:

  # ── MongoDB ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: billing-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db   # ✅ Data persists across restarts & redeploys

  # ── Backend (Node.js API) ────────────────────────────────────────────────
  backend:
    image: risewithmedia/billing-backend:latest
    container_name: billing-backend
    restart: always
    expose:
      - "5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/vjs_billing
      - JWT_SECRET=vjs_jewellery_super_secret_2024_key
    depends_on:
      - mongodb

  # ── Frontend (Vite + Nginx) ──────────────────────────────────────────────
  frontend:
    image: risewithmedia/billing-frontend:latest
    container_name: billing-frontend
    restart: always
    ports:
      - "8081:80"   # Access app at http://YOUR_VPS_IP:8081
    depends_on:
      - backend

volumes:
  mongodb_data:
    driver: local   # Named volume — survives container restarts and redeploys
